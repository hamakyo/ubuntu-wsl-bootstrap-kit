#cloud-config

users:
  - default
  - name: devops
    groups: [sudo]
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys:
      - "$SSH_PUBLIC_KEY"

package_update: true
package_upgrade: false
packages:
  - curl
  - git
  - python3
  - python3-pip

write_files:
  - path: /etc/motd
    permissions: "0644"
    content: |
      Ubuntu VM provisioned by cloud-init.
      Use Ansible for continuous configuration.

runcmd:
  - [bash, -lc, "echo '[cloud-init] first boot setup complete' | tee /var/log/first-boot.log"]
