---
- name: Ensure baseline packages are installed
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - git
      - make
      - python3
      - python3-pip
    state: present
    update_cache: true

- name: Ensure /opt/bootstrap-kit exists
  ansible.builtin.file:
    path: /opt/bootstrap-kit
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Place managed marker
  ansible.builtin.copy:
    dest: /opt/bootstrap-kit/managed-by-ansible.txt
    content: "This host baseline is managed by ansible.\n"
    owner: root
    group: root
    mode: "0644"
